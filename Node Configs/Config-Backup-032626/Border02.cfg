router bgp 65001
 template peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-policy OVERLAY-MCLUSTER-EVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-session UNDERLAY-SPINE-EVPN-PEER-SESSION-POLICY
  remote-as 65001
  description SPINE-EVPN-PEER
  log-neighbor-changes
  update-source Loopback0
  fall-over route-map FABRIC-LOOPBACKS
 exit-peer-session
 !
 template peer-session OVERLAY-MCLUSTER-EVPN-PEER-SESSION-POLICY
  description VXLAN-MULTICLUSTER-REMOTE-SITE-EVPN-PEER
  log-neighbor-changes
  ebgp-multihop 4
  update-source Loopback0
  fall-over route-map MCLUSTER-LOOPBACKS
 exit-peer-session
 !
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 198.19.1.1 inherit peer-session UNDERLAY-SPINE-EVPN-PEER-SESSION-POLICY
 neighbor 198.19.1.2 inherit peer-session UNDERLAY-SPINE-EVPN-PEER-SESSION-POLICY
 neighbor 198.19.1.200 remote-as 65003
 neighbor 198.19.1.200 inherit peer-session OVERLAY-MCLUSTER-EVPN-PEER-SESSION-POLICY
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv4 mvpn
  bgp nexthop trigger delay 0
  neighbor 198.19.1.1 activate
  neighbor 198.19.1.1 send-community extended
  neighbor 198.19.1.1 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  neighbor 198.19.1.2 activate
  neighbor 198.19.1.2 send-community extended
  neighbor 198.19.1.2 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
 exit-address-family
 !
 address-family l2vpn evpn
  bgp nexthop trigger delay 0
  rewrite-evpn-rt-asn
  neighbor 198.19.1.1 activate
  neighbor 198.19.1.1 send-community extended
  neighbor 198.19.1.1 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  neighbor 198.19.1.1 next-hop-self
  neighbor 198.19.1.2 activate
  neighbor 198.19.1.2 send-community extended
  neighbor 198.19.1.2 inherit peer-policy OVERLAY-SPINE-EVPN-PEER-POLICY
  neighbor 198.19.1.2 next-hop-self
  neighbor 198.19.1.200 activate
  neighbor 198.19.1.200 send-community extended
  neighbor 198.19.1.200 inherit peer-policy OVERLAY-MCLUSTER-EVPN-PEER-POLICY
 exit-address-family

! =============================================================
! Startup Configuration - Spine-01
! Purpose : Minimal config for Catalyst Center discovery
! Mgmt IP : 10.0.1.101/24  GW: 10.0.1.1
! Loopback0: 172.16.255.1/32
! Generated: 2026-03-03
! =============================================================

hostname Spine-01

! --- Management VRF ---
vrf definition Mgmt-vrf
 !
 address-family ipv4
 exit-address-family

! --- Domain (required for SSH key generation) ---
ip domain name dcloud.cisco.com

ip routing

! --- AAA ---
aaa new-model
aaa authentication login default local
aaa authorization exec default local

! --- Local credentials ---
username net-admin privilege 15 secret cisco
username cisco privilege 15 secret cisco

! --- Loopback0 (routing/OSPF router-id) ---
interface Loopback0
 description Routing Loopback
 ip address 172.16.255.1 255.255.255.255
 ip ospf 1 area 0

! --- Fabric-facing interfaces ---
interface GigabitEthernet1/0/1
 description Backbone interface to Leaf-01
 no switchport
 ip address 172.16.13.1 255.255.255.0
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet1/0/2
 description Backbone interface to Leaf-02
 no switchport
 ip address 172.16.14.1 255.255.255.0
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet1/0/3
 description Backbone interface to Border-01
 no switchport
 ip address 172.16.15.1 255.255.255.0
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet1/0/4
 description Backbone interface to Border-02
 no switchport
 ip address 172.16.16.1 255.255.255.0
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown

! --- Core-facing interfaces ---
interface GigabitEthernet1/0/5
 description Core-01
 no switchport
 ip address 172.16.81.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet1/0/6
 description Core-02
 no switchport
 ip address 172.16.91.1 255.255.255.0
 no shutdown

! --- Management interface ---
interface GigabitEthernet0/0
 vrf forwarding Mgmt-vrf
 ip address 10.0.1.101 255.255.255.0
 negotiation auto
 no shutdown

! --- Default route in Mgmt-vrf ---
ip route vrf Mgmt-vrf 0.0.0.0 0.0.0.0 10.0.1.1

! --- OSPF ---
router ospf 1
 router-id 172.16.255.1
 redistribute bgp 65001 metric-type 1 route-map BGP-TO-OSPF
 default-information originate

! --- BGP ---
router bgp 65001
 template peer-policy CORE-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-session CORE-SESSION
  remote-as 65002
 exit-peer-session
 !
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 172.16.81.8 inherit peer-session CORE-SESSION
 neighbor 172.16.91.9 inherit peer-session CORE-SESSION
 !
 address-family ipv4
  network 172.16.255.0 mask 255.255.255.0
  neighbor 172.16.81.8 activate
  neighbor 172.16.81.8 inherit peer-policy CORE-POLICY
  neighbor 172.16.91.9 activate
  neighbor 172.16.91.9 inherit peer-policy CORE-POLICY
 exit-address-family

! --- Static route for BGP network statement ---
ip route 172.16.255.0 255.255.255.0 Null0

! --- Prefix-list and route-map for OSPF redistribution ---
ip prefix-list DHCP-SERVER seq 5 permit 10.10.120.0/24
ip prefix-list DEFAULTRT seq 10 permit 0.0.0.0/0
ip prefix-list MCLUSTER-LOOPBACKS seq 15 permit 172.18.200.1/32
route-map BGP-TO-OSPF permit 10
 match ip address prefix-list DHCP-SERVER
route-map BGP-TO-OSPF permit 20
 match ip address prefix-list DEFAULTRT
route-map BGP-TO-OSPF permit 30
 match ip address prefix-list MCLUSTER-LOOPBACKS

! --- SSH version 2 ---
crypto key generate rsa modulus 2048
ip ssh version 2

! --- VTY lines - SSH only ---
line vty 0 15
 login authentication default
 transport input ssh
 exec-timeout 10 0

! --- SNMP ---
snmp-server community RO RO
snmp-server community RW RW

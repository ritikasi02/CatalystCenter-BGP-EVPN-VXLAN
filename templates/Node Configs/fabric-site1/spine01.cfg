router ospf 1
 router-id 172.16.255.1
 redistribute bgp 65001 metric-type 1 route-map BGP-TO-OSPF
 default-information originate
!
router bgp 65001
 template peer-policy CORE-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-policy OVERLAY-LEAF-EVPN-PEER-POLICY
  route-reflector-client
  soft-reconfiguration inbound
  send-community both
  advertise additional-paths all
 exit-peer-policy
 !
 template peer-policy OVERLAY-BORDER-EVPN-PEER-POLICY
  route-map EVPN-PEER-BORDER-OUT out
  route-reflector-client
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-policy OVERLAY-LEAF-MVPN-PEER-POLICY
  route-reflector-client
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-policy OVERLAY-BORDER-MVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-session CORE-SESSION
  remote-as 65002
 exit-peer-session
 !
 template peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY
  remote-as 65001
  log-neighbor-changes
  update-source Loopback0
  fall-over route-map NODE-LOOPBACKS
 exit-peer-session
 !
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 172.16.81.8 inherit peer-session CORE-SESSION
 neighbor 172.16.91.9 inherit peer-session CORE-SESSION
 neighbor 172.16.255.3 inherit peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY
 neighbor 172.16.255.4 inherit peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY
 neighbor 172.16.255.6 inherit peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY

  bgp nexthop trigger delay 0
  neighbor 172.16.255.3 activate
  neighbor 172.16.255.3 send-community extended
  neighbor 172.16.255.3 inherit peer-policy OVERLAY-LEAF-MVPN-PEER-POLICY
  neighbor 172.16.255.4 activate
  neighbor 172.16.255.4 send-community extended
  neighbor 172.16.255.4 inherit peer-policy OVERLAY-LEAF-MVPN-PEER-POLICY
  neighbor 172.16.255.6 activate
  neighbor 172.16.255.6 send-community extended
  neighbor 172.16.255.6 inherit peer-policy OVERLAY-BORDER-MVPN-PEER-POLICY
  neighbor 172.16.255.7 activate
  neighbor 172.16.255.7 send-community extended
  neighbor 172.16.255.7 inherit peer-policy OVERLAY-BORDER-MVPN-PEER-POLICY
 exit-address-family
 !
 address-family l2vpn evpn
  bgp additional-paths select all
  bgp additional-paths send receive
  bgp nexthop trigger delay 0
  neighbor 172.16.255.3 activate
  neighbor 172.16.255.3 send-community extended
  neighbor 172.16.255.3 inherit peer-policy OVERLAY-LEAF-EVPN-PEER-POLICY
  neighbor 172.16.255.4 activate
  neighbor 172.16.255.4 send-community extended
  neighbor 172.16.255.4 inherit peer-policy OVERLAY-LEAF-EVPN-PEER-POLICY
  neighbor 172.16.255.6 activate
  neighbor 172.16.255.6 send-community extended
  neighbor 172.16.255.6 inherit peer-policy OVERLAY-BORDER-EVPN-PEER-POLICY
  neighbor 172.16.255.7 activate
  neighbor 172.16.255.7 send-community extended
  neighbor 172.16.255.7 inherit peer-policy OVERLAY-BORDER-EVPN-PEER-POLICY
 exit-address-family
 !
 address-family ipv4 vrf red
  advertise l2vpn evpn
  import path selection all
  aggregate-address 10.2.22.0 255.255.255.0 summary-only
  aggregate-address 10.1.11.0 255.255.255.0 summary-only
  redistribute static
  redistribute connected
  neighbor 172.17.2.2 remote-as 65002
  neighbor 172.17.2.2 activate
  neighbor 172.17.2.6 remote-as 65002
  neighbor 172.17.2.6 activate
  maximum-paths ibgp 2
 exit-address-family

 description ** SVI for red L3VNI **
 vrf forwarding red
 ip unnumbered Loopback0
 no ip redirects
 no ip unreachables
 no ip proxy-arp
 ip pim sparse-mode
 load-interval 30
 carrier-delay msec 0
 no autostate
 hold-queue 4094 in
 hold-queue 4094 out
!
interface nve1
 description ** NVE Interface for VXLAN **
 no ip address
 source-interface Loopback0
 host-reachability protocol bgp
 member vni 50901 vrf red
!
router ospf 1
 router-id 172.16.255.2
 redistribute bgp 65001 metric-type 1 route-map BGP-TO-OSPF
 default-information originate
!
router bgp 65001
 template peer-policy CORE-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-policy OVERLAY-LEAF-EVPN-PEER-POLICY
  route-reflector-client
  soft-reconfiguration inbound
  send-community both
  advertise additional-paths all
 exit-peer-policy
 !
 template peer-policy OVERLAY-BORDER-EVPN-PEER-POLICY
  route-map EVPN-PEER-BORDER-OUT out
  route-reflector-client
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-policy OVERLAY-LEAF-MVPN-PEER-POLICY
  route-reflector-client
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-policy OVERLAY-BORDER-MVPN-PEER-POLICY
  soft-reconfiguration inbound
  send-community both
 exit-peer-policy
 !
 template peer-session CORE-SESSION
  remote-as 65002
 exit-peer-session
 !
 template peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY
  remote-as 65001
  log-neighbor-changes
  update-source Loopback0
  fall-over route-map NODE-LOOPBACKS
 exit-peer-session
 !
 bgp router-id interface Loopback0
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 172.16.82.8 inherit peer-session CORE-SESSION
 neighbor 172.16.92.9 inherit peer-session CORE-SESSION
 neighbor 172.16.255.3 inherit peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY
 neighbor 172.16.255.4 inherit peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY
 neighbor 172.16.255.6 inherit peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY
 neighbor 172.16.255.7 inherit peer-session UNDERLAY-LEAF-EVPN-PEER-SESSION-POLICY
 !
 address-family ipv4
  network 172.16.255.0 mask 255.255.255.0
  neighbor 172.16.82.8 activate
  neighbor 172.16.82.8 inherit peer-policy CORE-POLICY
  neighbor 172.16.92.9 activate
  neighbor 172.16.92.9 inherit peer-policy CORE-POLICY
 exit-address-family
 !
 address-family ipv4 mvpn
  bgp nexthop trigger delay 0
  neighbor 172.16.255.3 activate
  neighbor 172.16.255.3 send-community extended
  neighbor 172.16.255.3 inherit peer-policy OVERLAY-LEAF-MVPN-PEER-POLICY
  neighbor 172.16.255.4 activate
  neighbor 172.16.255.4 send-community extended
  neighbor 172.16.255.4 inherit peer-policy OVERLAY-LEAF-MVPN-PEER-POLICY
  neighbor 172.16.255.6 activate
  neighbor 172.16.255.6 send-community extended
  neighbor 172.16.255.6 inherit peer-policy OVERLAY-BORDER-MVPN-PEER-POLICY
  neighbor 172.16.255.7 activate
  neighbor 172.16.255.7 send-community extended
  neighbor 172.16.255.7 inherit peer-policy OVERLAY-BORDER-MVPN-PEER-POLICY
 exit-address-family
 !
 address-family l2vpn evpn
  bgp additional-paths select all
  bgp additional-paths send receive
  bgp nexthop trigger delay 0
  neighbor 172.16.255.3 activate
  neighbor 172.16.255.3 send-community extended
  neighbor 172.16.255.3 inherit peer-policy OVERLAY-LEAF-EVPN-PEER-POLICY
  neighbor 172.16.255.4 activate
  neighbor 172.16.255.4 send-community extended
  neighbor 172.16.255.4 inherit peer-policy OVERLAY-LEAF-EVPN-PEER-POLICY
  neighbor 172.16.255.6 activate
  neighbor 172.16.255.6 send-community extended
  neighbor 172.16.255.6 inherit peer-policy OVERLAY-BORDER-EVPN-PEER-POLICY
  neighbor 172.16.255.7 activate
  neighbor 172.16.255.7 send-community extended
  neighbor 172.16.255.7 inherit peer-policy OVERLAY-BORDER-EVPN-PEER-POLICY
 exit-address-family
 !
 address-family ipv4 vrf red
  advertise l2vpn evpn
  import path selection all
  aggregate-address 10.2.22.0 255.255.255.0 summary-only
  aggregate-address 10.1.11.0 255.255.255.0 summary-only
  redistribute static
  redistribute connected
  neighbor 172.17.2.10 remote-as 65002
  neighbor 172.17.2.10 activate
  neighbor 172.17.2.14 remote-as 65002
  neighbor 172.17.2.14 activate
  maximum-paths ibgp 2
 exit-address-family
!

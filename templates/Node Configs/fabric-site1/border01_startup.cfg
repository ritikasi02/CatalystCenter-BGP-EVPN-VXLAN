! =============================================================
! Startup Configuration - Border-01
! Purpose : Minimal config for Catalyst Center discovery
! Mgmt IP : 10.0.1.105/24  GW: 10.0.1.1
! Loopback0: 172.16.255.5/32
! Generated: 2026-03-03
! =============================================================

hostname Border-01

! --- Management VRF ---
vrf definition Mgmt-vrf
 !
 address-family ipv4
 exit-address-family

! --- Domain (required for SSH key generation) ---
ip domain name dcloud.cisco.com

ip routing

! --- AAA ---
aaa new-model
aaa authentication login default local
aaa authorization exec default local

! --- Local credentials ---
username net-admin privilege 15 secret cisco
username cisco privilege 15 secret cisco

! --- Loopback0 (routing/OSPF router-id) ---
interface Loopback0
 description Routing Loopback
 ip address 172.16.255.5 255.255.255.255
 ip ospf 1 area 0

! --- Fabric-facing interfaces ---
interface GigabitEthernet1/0/1
 description Backbone interface to Spine-01
 no switchport
 ip address 172.16.15.5 255.255.255.0
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet1/0/2
 description Backbone interface to Spine-02
 no switchport
 ip address 172.16.25.5 255.255.255.0
 ip pim sparse-mode
 ip ospf network point-to-point
 ip ospf 1 area 0
 no shutdown

! --- Management interface ---
interface GigabitEthernet0/0
 vrf forwarding Mgmt-vrf
 ip address 10.0.1.105 255.255.255.0
 negotiation auto
 no shutdown

! --- Default route in Mgmt-vrf ---
ip route vrf Mgmt-vrf 0.0.0.0 0.0.0.0 10.0.1.1

! --- OSPF ---
router ospf 1
 router-id 172.16.255.6

! --- SSH version 2 ---
crypto key generate rsa modulus 2048
ip ssh version 2

! --- VTY lines - SSH only ---
line vty 0 15
 login authentication default
 transport input ssh
 exec-timeout 10 0

! --- SNMP ---
snmp-server community RO RO
snmp-server community RW RW
